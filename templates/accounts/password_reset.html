<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 20px; }
        input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        button:hover { background: #4338ca; }
        a { color: #4f46e5; text-decoration: none; }
        .errorlist { color: #e74c3c; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Forgot your password?</h1>
    <p>Enter your email and we'll send you a link to reset it.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.email.errors }}
        {{ form.email }}
        <button type="submit">Send reset link</button>
    </form>
    <p style="margin-top:20px;"><a href="{% url 'accounts:login' %}">Back to login</a></p>
</div>
</body>
</html>
