<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check your email</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; }
        a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Check your email</h1>
    <p>If an account exists with that email, we've sent a link to reset your password.</p>
    <p style="margin-top:20px;"><a href="{% url 'accounts:login' %}">Back to login</a></p>
</div>
</body>
</html>
