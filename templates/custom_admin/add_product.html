

{% block content %}

<div class="product-form-container">

    <h1>Add New Product</h1>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-save">
            Save Product
        </button>

    </form>

</div>

<style>
.product-form-container{
    background:#fff;
    padding:30px;
    border-radius:15px;
    max-width:800px;
    margin:auto;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.product-form-container h1{
    color:#0097a7;
    margin-bottom:25px;
}

.product-form-container input,
.product-form-container textarea,
.product-form-container select{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

.btn-save{
    background:#00bcd4;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

.btn-save:hover{
    background:#0097a7;
}
</style>

{% endblock %}
