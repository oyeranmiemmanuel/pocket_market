<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set new password</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 20px; }
        input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        button:hover { background: #4338ca; }
        .errorlist { color: #e74c3c; font-size: 13px; margin-bottom: 10px; }
        label { display:block; font-size: 13px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="card">
    {% if validlink %}
        <h1>Set a new password</h1>
        <form method="post">
            {% csrf_token %}
            <label for="{{ form.new_password1.id_for_label }}">New password</label>
            {{ form.new_password1.errors }}
            {{ form.new_password1 }}
            <label for="{{ form.new_password2.id_for_label }}">Confirm new password</label>
            {{ form.new_password2.errors }}
            {{ form.new_password2 }}
            <button type="submit">Set new password</button>
        </form>
    {% else %}
        <h1>Link invalid</h1>
        <p>This password reset link is invalid or has already been used.</p>
        <p><a href="{% url 'accounts:password_reset' %}">Request a new one</a></p>
    {% endif %}
</div>
</body>
</html>
