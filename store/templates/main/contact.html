{% extends 'main/base.html' %}

{% block title %}Contact Admin - Top Tech{% endblock %}

{% block content %}

    <section class="hero">
        <h1>Contact Admin</h1>
        <p class="subtitle">Send a direct message to Nicholas</p>
    </section>

    <section class="contact-section">
        <div class="contact-form-container">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" id="contactForm">
                {% csrf_token %}

                <div class="form-group">
                    <label>Your Full Name <span class="required">*</span></label>
                    <input type="text" name="name" class="form-control" required 
                           minlength="3" maxlength="100" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" name="email" class="form-control" required 
                           placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label>Subject <span class="required">*</span></label>
                    <input type="text" name="subject" class="form-control" required 
                           minlength="5" maxlength="150" placeholder="e.g. Branding Project">
                </div>

                <div class="form-group">
                    <label>Your Message <span class="required">*</span></label>
                    <textarea name="message" class="form-control" rows="8" required 
                              minlength="20" placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="btn-large">Send Message to Admin</button>
            </form>
        </div>
    </section>

{% endblock %}
