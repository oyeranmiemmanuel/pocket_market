<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - TopTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="card w-full max-w-lg p-10 text-center">
        <h1 class="text-5xl font-bold text-gray-800 mb-4">Welcome to TopTech</h1>
        
        {% if user.is_authenticated %}
            <p class="text-xl text-gray-600 mb-8">
                Hello, <span class="font-semibold text-indigo-600">{{ user.username }}</span>!
            </p>
            
            
                <a href="{% url 'accounts:logout' %}" 
                   class="block w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-6 rounded-xl transition">
                    Logout
                </a>
            </div>
        {% else %}
            <p class="text-gray-600 mb-8">Please login to continue</p>
            <div class="flex gap-4 justify-center">
                <a href="{% url 'accounts:login' %}" 
                   class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-xl transition">
                    Login
                </a>
                <a href="{% url 'accounts:register' %}" 
                   class="bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-semibold py-3 px-8 rounded-xl transition">
                    Sign Up
                </a>
            </div>
        {% endif %}
    </div>
</body>
</html>
