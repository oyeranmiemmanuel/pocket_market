<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password reset complete</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 12px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; }
        a.btn { display:inline-block; margin-top: 20px; padding: 12px 24px; background: #4f46e5; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; }
        a.btn:hover { background: #4338ca; }
    </style>
</head>
<body>
<div class="card">
    <h1>Password reset complete</h1>
    <p>Your password has been changed. You can now log in with your new password.</p>
    <a class="btn" href="{% url 'accounts:login' %}">Log in</a>
</div>
</body>
</html>
