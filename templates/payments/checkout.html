

{% block title %}Checkout - {{ product.name }}{% endblock %}

{% block extra_css %}
<style>
.checkout-container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-group{
    margin-bottom:20px;
}

.form-control{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
}

.btn-large{
    width:100%;
    padding:15px;
    background:#00bcd4;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
{% endblock %}

{% block content %}

    <section class="hero">
        <h1>Checkout</h1>
        <p class="subtitle">Complete your purchase for <strong>{{ product.name }}</strong></p>
    </section>

    <section class="checkout-section">
        <div class="checkout-container">
            
            <div class="product-summary">
                <img src="{{ product.image.url }}" alt="{{ product.name }}" style="max-width:300px;">
                <h2>{{ product.name }}</h2>
                <h3>₦{{ product.price }}</h3>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>

                <div class="form-group">
                    <label> Address <span class="required">*</span></label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>

                <button type="submit" class="btn-large">Pay ₦{{ product.price }} with Paystack</button>
            </form>
        </div>
    </section>

{% endblock %}
